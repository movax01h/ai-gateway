name: "Fix pipeline (next)"
description: |
  Fix pipeline flow can be run for a failed CI jobs.
  When a merge request URL is provided, it pushes the fix directly to that MR's branch.
  Otherwise it opens a new MR with changes that address root cause of CI job failures.
product_group: agent_foundations
version: "v1"
environment: ambient

components:
  - name: "fix_pipeline_next_context"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_context"
    prompt_version: "^1.0.0"
    response_schema_id: "fix_pipeline_next_context"
    response_schema_version: "^1.0.0"
    response_schema_tracking: true
    response_schema_tracking_context:
      project_id: "context:project_id"
      merge_request_url: "context:inputs.merge_request.url"
    inputs:
      - from: "context:goal"
        as: "pipeline_url"
      - from: "context:inputs.merge_request.url"
        as: "merge_request_url"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
      - from: "context:inputs.workspace_agent_skills"
        as: "workspace_agent_skills"
        optional: True
    toolset:
      - get_downstream_pipelines
      - get_pipeline_failing_jobs:
          exclude_allow_failure: true
      - get_job_logs
      - list_merge_request_diffs
      - read_file
      - find_files
      - list_dir
      - gitlab_documentation_search
    ui_log_events:
      - "on_agent_reasoning"
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_next_decide_fix"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_decide_fix"
    prompt_version: "^1.0.0"
    response_schema_id: "fix_pipeline_next_decide_fix"
    response_schema_version: "^1.0.0"
    inputs:
      - from: "context:fix_pipeline_next_context.final_answer.summary"
        as: "fix_pipeline_context_results"
      - from: "context:fix_pipeline_next_execution.final_answer"
        as: "execution_results"
      - from: "context:fix_pipeline_next_check_diff.tool_responses"
        as: "execution_diff"
      - from: "context:inputs.merge_request.url"
        as: "merge_request_url"
        optional: True
    toolset: []
    ui_log_events:
      - "on_agent_final_answer"

  - name: "fix_pipeline_next_code_suggestions"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_code_suggestions"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:goal"
        as: "pipeline_url"
      - from: "context:inputs.merge_request.url"
        as: "merge_request_url"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
    toolset:
      - "build_review_merge_request_context"
      - "create_merge_request_diff_note"
      - "run_git_command"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_add_comment"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_add_comment"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:goal"
        as: "pipeline_url"
      - from: "context:inputs.merge_request.url"
        as: "merge_request_url"
      - from: "context:fix_pipeline_next_context.final_answer.summary"
        as: "fix_pipeline_context_results"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
      - from: "context:workflow_id"
        as: "workflow_id"
      - from: "context:session_url"
        as: "session_url"
      - from: "context:inputs.workspace_agent_skills"
        as: "workspace_agent_skills"
        optional: True
    toolset: ["create_merge_request_note"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "git_fetch_for_branch"
    type: DeterministicStepComponent
    tool_name: "run_git_command"
    inputs:
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
      - from: "fetch"
        as: "command"
        literal: True
      - from: "origin"
        as: "args"
        literal: True
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_next_create_branch"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_create_branch"
    prompt_version: "^1.0.0"
    response_schema_id: "create_repository_branch"
    response_schema_version: "^1.0.0"
    toolset:
      - "run_git_command"
    inputs:
      - from: "context:project_id"
        as: "project_id"
      - from: "context:inputs.pipeline.source_branch"
        as: "ref"
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
      - from: "context:fix_pipeline_next_context.final_answer.summary"
        as: "naming_context"
      - from: "context:workflow_id"
        as: "workflow_id"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
      - from: "context:inputs.workspace_agent_skills"
        as: "workspace_agent_skills"
        optional: True
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_next_checkout_existing_branch"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_checkout_existing_branch"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:inputs.pipeline.source_branch"
        as: "ref"
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
    toolset:
      - "run_git_command"
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_next_check_diff"
    type: DeterministicStepComponent
    tool_name: "run_git_command"
    inputs:
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
      - from: "diff"
        as: "command"
        literal: True
      - from: "--no-color"
        as: "args"
        literal: True
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_next_execution"
    type: AgentComponent
    prompt_id: "fix_pipeline_next_execution"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:fix_pipeline_next_context.final_answer.summary"
        as: "fix_pipeline_context_results"
      - from: "context:inputs.pipeline.source_branch"
        as: "source_branch"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
      - from: "context:inputs.os_information"
        as: "os_information"
      - from: "context:inputs.workspace_agent_skills"
        as: "workspace_agent_skills"
        optional: True
    toolset:
      - create_file_with_contents
      - edit_file
      - find_files
      - mkdir
      - read_file
      - run_command
      - gitlab_documentation_search
    ui_log_events:
      - "on_agent_reasoning"
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_git_commit"
    type: AgentComponent
    prompt_id: "commit_changes"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
      - from: "context:inputs.workspace_agent_skills"
        as: "workspace_agent_skills"
        optional: True
    toolset:
      - "run_git_command"
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "git_fetch_unshallow"
    type: DeterministicStepComponent
    tool_name: "run_git_command"
    inputs:
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
      - from: "fetch"
        as: "command"
        literal: True
      - from: "--unshallow"
        as: "args"
        literal: True
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "git_push_branch"
    type: DeterministicStepComponent
    tool_name: "run_git_command"
    inputs:
      - from: "context:project_http_url_to_repo"
        as: "repository_url"
      - from: "push"
        as: "command"
        literal: True
      - from: "origin HEAD --no-verify"
        as: "args"
        literal: True
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "fix_pipeline_next_create_new_mr"
    type: OneOffComponent
    prompt_id: "fix_pipeline_next_create_new_mr"
    prompt_version: "^1.0.0"
    max_correction_attempts: 3
    inputs:
      - from: "context:goal"
        as: "pipeline_url"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:inputs.pipeline.source_branch"
        as: "source_branch"
      - from: "context:inputs.agent_platform_standard_context.primary_branch"
        as: "default_branch"
      - from: "context:fix_pipeline_next_create_branch.final_answer.branch_name"
        as: "source_branch_name"
      - from: "context:fix_pipeline_next_execution.final_answer"
        as: "execution_results"
      - from: "context:workflow_id"
        as: "workflow_id"
      - from: "context:session_url"
        as: "session_url"
      - from: "context:inputs.agent_platform_standard_context.session_owner_id"
        as: "assignee_id"
      - from: "context:inputs.merge_request.url"
        as: "merge_request_url"
        optional: True
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
    toolset:
      - "create_merge_request"
      - "create_merge_request_note"
    ui_log_events:
      - "on_tool_call_input"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

routers:
  - from: "fix_pipeline_next_context"
    condition:
      input: "context:fix_pipeline_next_context.final_answer.decision"
      routes:
        "add_comment": "fix_pipeline_add_comment"
        "create_plan": "fix_pipeline_next_checkout_existing_branch"
        "no_action": "end"
        "default_route": "end"
  - from: "fix_pipeline_next_checkout_existing_branch"
    to: "fix_pipeline_next_execution"
  - from: "fix_pipeline_add_comment"
    to: "end"
  - from: "fix_pipeline_next_execution"
    to: "fix_pipeline_next_check_diff"
  - from: "fix_pipeline_next_check_diff"
    to: "fix_pipeline_next_decide_fix"
  - from: "fix_pipeline_next_decide_fix"
    condition:
      input: "context:fix_pipeline_next_decide_fix.final_answer.decision"
      routes:
        "create_fix_on_existing_mr": "fix_pipeline_next_code_suggestions"
        "create_fix_on_new_mr": "git_fetch_for_branch"
        "no_action_needed": "end"
        "default_route": "git_fetch_for_branch"
  - from: "fix_pipeline_next_code_suggestions"
    to: "end"
  - from: "git_fetch_for_branch"
    to: "fix_pipeline_next_create_branch"
  - from: "fix_pipeline_next_create_branch"
    condition:
      input: "context:fix_pipeline_next_create_branch.final_answer.status"
      routes:
        "success": "fix_pipeline_git_commit"
        "default_route": "end"
  - from: "fix_pipeline_git_commit"
    to: "git_fetch_unshallow"
  - from: "git_fetch_unshallow"
    to: "git_push_branch"
  - from: "git_push_branch"
    condition:
      input: "context:git_push_branch.execution_result"
      routes:
        "failed": "end"
        "default_route": "fix_pipeline_next_create_new_mr"
  - from: "fix_pipeline_next_create_new_mr"
    to: "end"

flow:
  entry_point: "fix_pipeline_next_context"
  inputs:
    - category: merge_request
      input_schema:
        url:
          type: string
          format: uri
          description: The URL for the GitLab Merge Request
    - category: pipeline
      input_schema:
        source_branch:
          type: string
        source:
          type: string
          description: The pipeline source (e.g. merge_request_event, push)
          optional: true
    - category: agent_platform_standard_context
      input_schema:
        workload_branch:
          type: string
          description: The workload branch for the GitLab Merge Request
        primary_branch:
          type: string
          description: Merge Request target branch
        session_owner_id:
          type: string
          description: Human user's ID that initiated the flow
