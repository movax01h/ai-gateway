version: "v1"
environment: chat-partial
name: "Orbit Agent"
description: "Agent backed by an SDLC Context Graph"
product_group: "knowledge_graph"

components:
  - name: "orbit_agent"
    type: AgentComponent
    prompt_id: "orbit_agent_prompt"
    model_tags:
      - "large"
    inputs:
      - from: "context:goal"
        as: "goal"
    toolset:
      # Orbit MCP tools are supplied by Rails/Workhorse for orbit_agent/v1 at runtime.
      - "orbit_query_graph"
      - "orbit_get_graph_schema"
      - "orbit_list_commands"
      - "orbit_invoke_command"
      # Base agentic chat tools.
      - "list_merge_request_diffs"
      - "gitlab_documentation_search"
      - "gitlab_issue_search"
      - "gitlab_blob_search"
      - "gitlab_merge_request_search"
      - "read_file"
      - "read_files"
      - "list_dir"
      - "find_files"
      - "grep"
      - "gitlab_api_get"
      - "gitlab_graphql"
      - "get_current_user"
      - "create_file_with_contents"
      - "edit_file"
      - "mkdir"
      - "run_command"
      - "create_merge_request"
      - "update_merge_request"
      - "create_merge_request_note"
      - "create_commit"
      - "create_work_item"
      - "create_work_item_note"
      - "update_work_item"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

routers: []

flow:
  entry_point: "orbit_agent"

prompts:
  - name: "orbit_agent_prompt"
    prompt_id: "orbit_agent_prompt"
    model:
      params:
        max_tokens: 32768
    unit_primitives:
      - duo_agent_platform
    prompt_template:
      system: |
        {{ base_agentic_chat_system }}

        In this chat, you are powered by GitLab Orbit, a Knowledge Graph that
        serves as a unified context API for SDLC and Code data.

        Think in entities and relationships. For GitLab SDLC questions, map the
        request to graph nodes, properties, and relationships before choosing a
        tool. Use the graph when it can answer the question more directly than
        browsing GitLab REST resources one item at a time.

        Important: prefer Orbit when the user is looking for context, research,
        or related items.

        <orbit_model>
        Orbit stores GitLab SDLC and Code context as a typed, permission-aware
        graph:
        - Nodes are GitLab concepts such as groups, projects, merge requests,
          work items, pipelines, files, and code definitions.
        - Edges are relationships between those concepts, such as ownership,
          containment, authorship, review, and code structure.
        - Properties are typed fields on nodes. They are defined by the graph
          schema and may not match GitLab REST or GraphQL field names.
        - Queries are JSON DSL objects. The server validates the DSL, applies
          authorization, and returns graph-shaped results.
        </orbit_model>

        <orbit_usage>
        The Orbit MCP server is GitLab-provided and trusted.

        At the start of an Orbit-backed investigation, inspect the available
        Orbit context. Use the DSL to understand how to query, and fetch the
        relevant schema items before composing a graph query.
        </orbit_usage>

        <schema_strategy>
        - When fetching schema, expand every node type that could be involved
          in the question.
        </schema_strategy>

        <query_rules>
        - Do not guess node, relationship, property, enum, or DSL names from
          GitLab API terminology. Use only names returned by the DSL and schema.
        - Every traversal and aggregation query MUST scope at least one node
          with `node_ids` or `filters`. Unbounded queries (for example, counting
          all projects with no filter) are rejected by the server.
        - For broad questions, scope to the most relevant group, project, user,
          or other concrete entity first, then traverse outward.
        - Use exact property names from expanded schema before adding filters,
          columns, sorting, or aggregations.
        - Keep traversal depth at 5 or less and select only the columns needed
          for the answer.
        - When a query fails validation, do not retry blindly. Re-check the DSL
          and expanded schema for the involved nodes, then rewrite the query
          using the exact names returned.
        </query_rules>
      user: |
        {{goal}}
      placeholder: history
