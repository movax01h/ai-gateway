version: "v1"
environment: ambient

components:
  # Configures git remote with authenticated URL so the agent can use plain git
  # commands via run_command. This is a backward-compatibility measure for GitLab
  # instances that predate the runner-level git setup introduced in
  # https://gitlab.com/gitlab-org/gitlab/-/merge_requests/226743
  - name: "git_setup"
    type: DeterministicStepComponent
    tool_name: "run_command"
    inputs:
      - from: 'git config user.name "${DUO_WORKFLOW_GIT_AUTHOR_USER_NAME:-Duo}"; git config user.email "${DUO_WORKFLOW_GIT_AUTHOR_EMAIL:-noreply@gitlab.com}"; proto="${DUO_WORKFLOW_GIT_HTTP_BASE_URL:?DUO_WORKFLOW_GIT_HTTP_BASE_URL is not set}"; proto="${proto%%://*}"; host="${DUO_WORKFLOW_GIT_HTTP_BASE_URL#*://}"; repo_url="${proto}://oauth:${DUO_WORKFLOW_GIT_HTTP_PASSWORD:?DUO_WORKFLOW_GIT_HTTP_PASSWORD is not set}@${host%/}/${GITLAB_PROJECT_PATH:?GITLAB_PROJECT_PATH is not set}.git"; git remote set-url origin "${repo_url}"'
        as: "command"
        literal: true
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  # The CI runner creates a depth=1 shallow clone. Unshallow so the agent has
  # full history for commits, amends, rebases, and pushes. Without this,
  # commits in a shallow clone can become orphan/root commits, causing MR
  # diffs to show every file in the repo as changed.
  # See: https://gitlab.com/gitlab-org/modelops/applied-ml/code-suggestions/ai-assist/-/issues/2109
  - name: "git_unshallow"
    type: DeterministicStepComponent
    tool_name: "run_command"
    inputs:
      - from: "if git rev-parse --is-shallow-repository | grep -q true; then git fetch --unshallow; fi"
        as: "command"
        literal: true
      # Large repos can take several minutes to unshallow; override the default
      # 120 s timeout to avoid premature failures on big repositories.
      # This version (2.0.0+) requires clients that support the command_timeout
      # capability, so the timeout will not be silently ignored.
      - from: "600"
        as: "timeout"
        literal: true
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  - name: "developer_agent"
    type: AgentComponent
    prompt_id: "developer_agent_prompt"
    inputs:
      - from: "context:goal"
        as: "goal"
      - from: "context:project_id"
        as: "project_id"
        optional: True
      - from: "context:project_http_url_to_repo"
        as: "project_url"
        optional: True
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: True
      - from: "context:inputs.workspace_agent_skills"
        as: "workspace_agent_skills"
        optional: True
      # TODO: This seems not to be send by the CI --> Probably we should have this from the CI as well!
      - from: "context:inputs.agent_user_environment"
        as: "agent_user_environment"
        optional: True
      - from: "context:current_date"
        as: "today"
      - from: "context:inputs.agent_platform_standard_context.primary_branch"
        as: "primary_branch"
        optional: True
      - from: "context:inputs.agent_platform_standard_context.session_owner_id"
        as: "session_owner_id"
        optional: True
    toolset:
      - "read_file"
      - "find_files"
      - "list_dir"
      - "grep"
      - "create_file_with_contents"
      - "edit_file"
      - "mkdir"
      - "todo_write"
      - "run_command"
      - "gitlab_api_get"
      - "create_issue_note"
      - "create_merge_request_note"
      - "create_work_item_note"
      - "create_merge_request"
      - "update_merge_request"

    ui_log_events:
      - "on_agent_reasoning"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"
      - "on_agent_final_answer"

routers:
  - from: "git_setup"
    to: "git_unshallow"
  - from: "git_unshallow"
    to: "developer_agent"
  - from: "developer_agent"
    to: "end"

flow:
  entry_point: "git_setup"
  inputs:
    - category: agent_platform_standard_context
      input_schema:
        workload_branch:
          type: string
          description: The workload branch for the GitLab Merge Request
        primary_branch:
          type: string
          description: Merge Request target branch
        session_owner_id:
          type: string
          description: Human user's ID that initiated the flow
prompts:
  - name: "developer_agent_prompt"
    prompt_id: "developer_agent_prompt"
    params:
      timeout: 120
    unit_primitives:
      - duo_agent_platform
    prompt_template:
      system: |
        You are Duo, an expert coding agent made by GitLab. You operate autonomously — you receive a task, execute it, and persist your results to GitLab.

        # Guidelines
        - Be concise. Use GitLab-flavored markdown for formatting.
        - If you hit a blocker or need input, ask the user. Prefer making reasonable assumptions and proceeding over asking questions.
        - When creating merge requests, create them as **draft** (prefix title with `Draft:`) unless instructed otherwise.
        - Use `todo_write` to plan and track tasks. Break complex work into steps, mark items in_progress when starting and completed when done. Todos are shown to the user in real time.

        # Coding
        - Fix problems at the root cause rather than applying surface-level patches. Read the codebase first, resist easy assumptions, and prefer the repo's existing patterns over inventing new approaches.
        - Keep changes closely scoped and minimal. Leave unrelated refactors, import reorganizations, and metadata churn alone.
        - After making changes, verify they work — run the project's tests AND test your fix in combination with surrounding code (e.g., wrapped in other expressions, called with edge-case inputs). If any verification produces an unexpected result, investigate it before proceeding.

        # Tools
        - Use specialized tools for file operations (`read_file`, `edit_file`, `create_file_with_contents`, `find_files`, `grep`) instead of shell equivalents.
        - Use `run_command` for git, `glab`, and other terminal operations.
        - You can call multiple tools in a single response. Make independent calls in parallel; only sequence calls that depend on previous results.

        # Git

        ## Branches
        {% include 'common/branch_naming/1.0.0.jinja' %}

        ## Commits
        {% include 'common/git_commits/1.0.0.jinja' %}

        ## Pushing
        - Never force push. Always use regular commits and `git push`.
        - **Exception — rebase to resolve conflicts:**
          1. Create and push a backup branch: `duo-developer-backup/<branch>`
          2. Rebase, then push with `git push --force-with-lease`
          3. Post a comment on the MR explaining what was done
        - Never rewrite history (squash, amend) without explicit user instruction.

        <env>
          Today's date: {{ today }}
          {%- if project_id %}
          Checked-out project: {{ project_url }} (GitLab Project ID: {{ project_id }}{% if primary_branch %}, default branch: {{ primary_branch }}{% endif %})
          {%- endif %}
          {%- if agent_user_environment %}
          Execution environment: {{ agent_user_environment }}
          {%- endif %}
          {%- if session_owner_id %}
          Triggering user ID: {{ session_owner_id }}
          {%- endif %}
          Available CLI tools: glab (authenticated for this GitLab instance), git
        </env>

        The checked-out project is your local workspace — your task may target any project on this GitLab instance.

        {% include 'common/orbit_skill/1.0.0.jinja' %}

        {% include 'agents_dot_md/base/1.0.0.jinja' %}
        {% include 'workspace_agent_skills/base/1.0.0.jinja' %}

      user: |
        {{ goal }}
