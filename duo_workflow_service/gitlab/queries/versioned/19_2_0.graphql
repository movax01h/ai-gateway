query($workflowId: AiDuoWorkflowsWorkflowID!) {
    duoWorkflowWorkflows(workflowId: $workflowId) {
        nodes {
            statusName
            projectId
            project {
                id
                name
                description
                httpUrlToRepo
                languages {
                    name
                    share
                }
                webUrl
                statisticsDetailsPaths {
                    repository
                }
                duoContextExclusionSettings {
                    exclusionRules
                }
                duoWorkflowStatusCheck {
                    foundationalFlowsEnabled
                    enabledFoundationalFlows
                }
                namespace {
                    aiSettings {
                        promptInjectionProtectionLevel
                    }
                }
            }
            namespaceId
            namespace {
                id
                name
                description
                webUrl
                aiSettings {
                    promptInjectionProtectionLevel
                }
            }
            agentPrivilegesNames
            preApprovedAgentPrivilegesNames
            mcpEnabled
            incrementalCheckpointsEnabled
            allowAgentToRequestUser
            latestCheckpoint {
                threadTs
                parentTs
                metadata
                compressedCheckpoint
            }
            archived
            stalled
        }
    }
}
