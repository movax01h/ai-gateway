install:
  extends: .poetry
  stage: build
  cache:
    policy: push
  script:
    - poetry install --with lint,test

.docker-build-arch:
  extends:
    - .docker
  parallel:
    matrix:
      - ARCH: amd64
        RUNNER: saas-linux-medium-amd64
      - ARCH: arm64
        RUNNER: saas-linux-medium-arm64
  tags:
    - $RUNNER
  script:
    - docker buildx build
        --file "${BUILD_FILE:-Dockerfile}"
        --tag "${BUILD_TAG}-${ARCH}"
        ${BUILD_EXTRA_ARGS}
        --push
        .

.docker-manifest:
  extends:
    - .docker
  script:
    - docker manifest create ${MANIFEST_TAG}
        ${MANIFEST_TAG}-amd64
        ${MANIFEST_TAG}-arm64
    - docker manifest push ${MANIFEST_TAG}

build-docker-model-gateway-arch:
  stage: build
  extends:
    - .docker-build-arch
  variables:
    BUILD_TAG: "${TARGET_IMAGE}"
    BUILD_EXTRA_ARGS: "--build-arg GITLAB_API_TOKEN=$GITLAB_API_TOKEN"

build-docker-model-gateway:
  stage: build
  extends:
    - .docker-manifest
  variables:
    MANIFEST_TAG: "${TARGET_IMAGE}"
  needs:
    - build-docker-model-gateway-arch

build:ingest-image:
  stage: build
  extends:
    - .docker
  script:
    - docker buildx build
        --file scripts/ingest/Dockerfile
        --tag "${INGEST_IMAGE}"
        --push
        .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - scripts/ingest/**/*
        - Makefile
        - poetry.lock
        - pyproject.toml
        - .tool-versions
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "ingest"

build:self-hosted-ai-gateway-image-arch:
  stage: build
  extends:
    - .docker-build-arch
  variables:
    BUILD_FILE: docker/self_hosted/Dockerfile
    BUILD_TAG: "${TARGET_IMAGE}"
    BUILD_EXTRA_ARGS: "--build-arg TAG=$CI_COMMIT_TAG --build-arg SRC_IMAGE=${TARGET_IMAGE}-${ARCH}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^self-hosted-/
  needs:
    - build-docker-model-gateway

build:self-hosted-ai-gateway-image:
  stage: build
  extends:
    - .docker-manifest
  variables:
    MANIFEST_TAG: "${TARGET_IMAGE}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^self-hosted-/
  needs:
    - build:self-hosted-ai-gateway-image-arch

build:self-hosted-ai-gateway-latest-image-arch:
  stage: build
  extends:
    - .docker-build-arch
  variables:
    BUILD_FILE: docker/self_hosted/Dockerfile
    BUILD_TAG: "${SELF_HOSTED_TARGET_IMAGE}"
    BUILD_EXTRA_ARGS: "--build-arg TAG=master --build-arg SRC_IMAGE=${TARGET_IMAGE}-${ARCH}"
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build-docker-model-gateway

build:self-hosted-ai-gateway-latest-image:
  stage: build
  extends:
    - .docker-manifest
  variables:
    MANIFEST_TAG: "${SELF_HOSTED_TARGET_IMAGE}"
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build:self-hosted-ai-gateway-latest-image-arch

# FIPS builds use buildx for --build-context support.
# arm64 FIPS images are not yet supported due to UBI9 base image
# and CNG hardening script compatibility concerns.
.build-fips-base-image:
  stage: build
  extends:
    - .docker
  variables:
    TARGET_IMAGE: "${FIPS_TARGET_IMAGE}"
  script:
    - docker buildx build
        --file docker/fips/Dockerfile
        --tag "$TARGET_IMAGE"
        --build-arg GITLAB_API_TOKEN=$GITLAB_API_TOKEN
        --build-context hardening=https://gitlab.com/gitlab-org/build/CNG.git#v18.3.5:hardening
        --push
        .
  needs:
    - build-docker-model-gateway

build:ai-gateway-fips-base-image:
  extends: .build-fips-base-image
  rules:
    - if: $CI_COMMIT_TAG =~ /^self-hosted-/

build:ai-gateway-fips-base-image-nightly:
  extends: .build-fips-base-image
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.build-self-hosted-fips-base-image:
  stage: build
  extends:
    - .docker
  variables:
    TARGET_IMAGE: "${SELF_HOSTED_FIPS_TARGET_IMAGE}"
  script:
    - docker buildx build
        --file docker/self_hosted/Dockerfile.fips
        --tag "$TARGET_IMAGE"
        --build-arg TAG=${FIPS_TAG}
        --build-arg SRC_IMAGE="${FIPS_TARGET_IMAGE}"
        --push
        .

build:self-hosted-ai-gateway-fips-image:
  extends: .build-self-hosted-fips-base-image
  variables:
    FIPS_TAG: "$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG =~ /^self-hosted-/
  needs:
    - build:ai-gateway-fips-base-image

build:self-hosted-ai-gateway-fips-image-nightly:
  extends: .build-self-hosted-fips-base-image
  variables:
    FIPS_TAG: "master"
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build:ai-gateway-fips-base-image-nightly
