lint:
  extends: .poetry
  stage: test
  needs:
    - install
  script:
    - BUF_VERSION=$(grep '^buf ' .tool-versions | awk '{print $2}') && curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-$(uname -s)-$(uname -m)" -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf && sha256sum /usr/local/bin/buf
    - make lint-code
    - poetry lock --no-cache
    - git diff --exit-code
  after_script:
    - |
      # Hint for fixing issues
      MAGENTA=$(printf '\e[35m')
      BOLD=$(printf '\e[1m')
      RESET=$(printf '\e[0m')
      echo "${MAGENTA}Run ${BOLD}make format${RESET}${MAGENTA} to fix formatting issues.${RESET}"

# Fast-feedback ruff job: runs in a couple of seconds and emits a GitLab Code
# Quality report so violations annotate the MR diff inline. The full `lint` job
# above still runs ruff via `make lint-code` for local/CI parity; this job just
# fails fast and surfaces findings in the UI.
lint:ruff:
  extends: .poetry
  stage: test
  needs:
    - install
  variables:
    RUFF_PATHS: "ai_gateway duo_workflow_service lib lints scripts tests integration_tests"
  script:
    - poetry run ruff check --output-format=gitlab --output-file=gl-code-quality-report.json ${RUFF_PATHS} || true
    - poetry run ruff check ${RUFF_PATHS}
    - poetry run ruff format --check ${RUFF_PATHS}
  artifacts:
    when: always
    reports:
      codequality: gl-code-quality-report.json

lint:model_config_files:
  stage: test
  extends: .poetry
  needs:
    - install
  rules:
    - changes:
        - "ai_gateway/model_selection/*.{yml}"
  script:
    - make check-model-selection

lint:pricing_multipliers:
  stage: test
  extends: .poetry
  needs:
    - install
  rules:
    - if: $CI_PROJECT_PATH == "gitlab-org/modelops/applied-ml/code-suggestions/ai-assist" && $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_EVENT_TYPE != "merge_train" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      changes:
        - "ai_gateway/model_selection/*.{yml}"
    - if: $CI_PROJECT_PATH == "gitlab-org/modelops/applied-ml/code-suggestions/ai-assist" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "ai_gateway/model_selection/*.{yml}"
  script:
    - make check-pricing-multipliers

lint:doc:
  stage: test
  image: ${DOCS_LINT_IMAGE}
  needs: []
  rules:
    - changes:
        - "**/*.{md}"
        - "{doc}/**/*"
  script:
    - make lint-doc

lint:commit:
  stage: test
  image: registry.hub.docker.com/library/node:alpine
  needs: []
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
    - npm install
  script:
    - npx commitlint --from="$CI_MERGE_REQUEST_DIFF_BASE_SHA" --help-url
    - echo "Verifying Merge request title formatting"
    - echo "$CI_MERGE_REQUEST_TITLE" | npx commitlint
  rules:
    - if: '$CI_MERGE_REQUEST_DIFF_BASE_SHA && $CI_MERGE_REQUEST_DRAFT == "true"'
      allow_failure: true
    - if: "$CI_MERGE_REQUEST_DIFF_BASE_SHA"
